version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whspr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-whspr_user}
      POSTGRES_PASSWORD: ${DATABASE_PASS:-whspr_password}
      POSTGRES_DB: ${DATABASE_NAME:-whspr}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-whspr_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whspr_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
