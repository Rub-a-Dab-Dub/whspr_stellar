name: Contracts Deploy Testnet

on:
  workflow_run:
    workflows: ["Contracts Test"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-testnet:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Register testnet network
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" || true

      - name: Create CI key and fund via friendbot
        run: |
          stellar keys generate ci-testnet --network testnet --fund || true
          bash scripts/fund-testnet-account.sh --account-alias ci-testnet

      - name: Deploy contracts to testnet
        run: |
          bash scripts/deploy-all.sh \
            --network testnet \
            --source-account ci-testnet \
            --registry deployments/registry.json \
            --commit-sha "${GITHUB_SHA}"

      - name: Post-deploy health checks
        run: |
          bash scripts/verify-deployment.sh \
            --network testnet \
            --source-account ci-testnet \
            --registry deployments/registry.json

      - name: Commit updated testnet registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/registry.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update testnet contract registry"
          git push origin HEAD:develop
