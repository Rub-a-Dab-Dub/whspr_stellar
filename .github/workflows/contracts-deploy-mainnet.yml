name: Contracts Deploy Mainnet

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch or SHA)"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  deploy-mainnet:
    runs-on: ubuntu-latest
    environment: mainnet
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Register mainnet network
        run: |
          stellar network add mainnet \
            --rpc-url https://soroban-rpc.mainnet.stellar.gateway.fm \
            --network-passphrase "Public Global Stellar Network ; September 2015" || true

      - name: Import deploy key
        env:
          MAINNET_SECRET_KEY: ${{ secrets.MAINNET_SECRET_KEY }}
        run: |
          if [ -z "${MAINNET_SECRET_KEY}" ]; then
            echo "Missing required secret MAINNET_SECRET_KEY"
            exit 1
          fi
          stellar keys add ci-mainnet --secret-key "${MAINNET_SECRET_KEY}" || true

      - name: Deploy contracts to mainnet
        run: |
          bash scripts/deploy-all.sh \
            --network mainnet \
            --source-account ci-mainnet \
            --registry deployments/registry.json \
            --commit-sha "${GITHUB_SHA}"

      - name: Post-deploy health checks
        run: |
          bash scripts/verify-deployment.sh \
            --network mainnet \
            --source-account ci-mainnet \
            --registry deployments/registry.json

      - name: Commit updated mainnet registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/registry.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update mainnet contract registry"
          git push origin HEAD:${{ inputs.ref }}
