name: Backend E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: gasless_gossip_test
      JWT_SECRET: e2e-super-secret-key-that-is-at-least-thirty-two-chars
      EVM_RPC_URL: https://example.invalid/rpc
      EVM_PRIVATE_KEY: 0x0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      EVM_ACCOUNT_ADDRESS: 0x1111111111111111111111111111111111111111
      EVM_CONTRACT_ADDRESS: 0x2222222222222222222222222222222222222222
      STORAGE_BUCKET: gasless-gossip-e2e
      STORAGE_ACCESS_KEY_ID: test-access-key
      STORAGE_SECRET_ACCESS_KEY: test-secret-key
      STORAGE_ENDPOINT: https://storage.invalid
      STORAGE_PUBLIC_BASE_URL: https://cdn.invalid
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org:443
      SOROBAN_CONTRACT_IDS: test-contract-id
      OTEL_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run e2e suite
        run: npm run test:e2e:ci

      - name: Upload e2e coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage-e2e
